[competition]
slug = "pokemon-tcg-ai-battle"
kaggle_user = "aldisued"
enable_gpu = false
submit_file = "submission.tar.gz"
pattern = "simulation"
inference_notebook = ""
checkpoint_dir = "outputs"
primary_metric = "win_rate"
agent_file = "agents/abomasnow.py"
deck_file = "decks/abomasnow.csv"

[train]
# SCALED config (option 1): bigger net (MODEL_ARGS in agents/mcts.py) + deeper SEQUENTIAL
# self-play search for better targets + more data/steps. Slower per iter; run many epochs
# on the cluster: `make train-agent-cluster EPOCHS=200`. Revert batched=true for fast iteration.
eval_games = 16         # games PER opponent; gate = avg over 4 rule agents (~64 games)
self_play_games = 48    # 3 per worker on 16 workers
eval_every = 10         # iters are slower now; eval gauntlet less often
search_count = 25       # deeper search => better value/policy TARGETS (the real bottleneck)
batched = false         # SEQUENTIAL search has real depth (batched is breadth-only); needed for good targets
num_workers = 16        # cap below cores to avoid memory-bandwidth contention
# Opponents: "random" floor, "rule:<name>" heuristic meta deck, "self" = best checkpoint.
# Best checkpoint is gated on the average win-rate vs the rule agents.
eval_opponents = ["random", "rule:zacian", "rule:abomasnow", "rule:dragapult", "rule:lucario", "self"]
# Self-play data sources. Keep "self" only: a rule-heavy pool COLLAPSES the value net
# (the agent loses most games vs strong agents -> all-loss data -> value -> -1 everywhere).
# The "rule:<name>" option exists for careful curriculum/small-dose experiments, not bulk.
selfplay_opponents = ["self"]
replay_buffer_size = 200000   # larger sliding window of recent self-play (less wobble/forgetting)
train_steps = 200             # more gradient steps per iter (random minibatches from the buffer)
