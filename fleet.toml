# Fleet registry — machines that train kego agents, and the central hub they report to.
# See docs/superpowers/specs/2026-07-03-fleet-training-fabric-design.md for the schema.
#
# The dispatcher rsyncs the local repo to each machine's `repo`, runs training over SSH
# (`ssh`), and every run logs to the hub MLflow. When the hub is unreachable a machine
# tracks to a local sqlite store and reconciles later with `kego sync`.
#
# SELF-REGISTER: run `make fleet-register` ON each new machine — it auto-detects the fleet
# name, `user@host` ssh target, repo path, and GPUs (via nvidia-smi) and appends itself
# here. Only the hub and machines verified so far are listed; the rest are commented
# templates. Commit fleet.toml after a machine registers so the whole fleet sees it.

[hub]
name = "omarchyd"
mlflow = "http://192.168.178.32:5000"

# Hub + GPU head node: RTX 3090 (heavy_gpu) + RTX 2080 Ti. Runs the MLflow server.
[[machine]]
name = "omarchyd"
ssh = "kristian@omarchyd"
role = "hub"
repo = "/home/kristian/projects/kego"
data = "/home/kristian/projects/kego/data"
gpus = ["rtx3090", "rtx2080ti"]

# This machine — Apple Silicon MacBook Pro, CPU self-play only (no CUDA).
[[machine]]
name = "kristians-macbook-pro"
ssh = "kristianehlert@kristians-macbook-pro"
role = "cpu"
repo = "/Users/kristianehlert/projects/kego"

# Windows WSL Ubuntu box — RTX 2080 Ti (GPU self-play). Registered as cpu because
# nvidia-smi returned nothing at fleet-register time; role/gpus set manually here.
[[machine]]
name = "DESKTOP-68OIS2S"
ssh = "kristian@DESKTOP-68OIS2S"
role = "gpu"
repo = "/home/kristian/projects/kego"
gpus = ["rtx2080ti"]

